model_short: llama
task_name: somo
dataset:
  train: cache/llama/somo_train/
  test: cache/llama/somo_test/
mdl:
  batch_size: 64
  probe_type: mlp
  probe_hidden_size:
  - 16
  num_classes: 2
  init_strategy: mup
  init_gamma: null
  optimizer: adam
  train_epochs: 20
  lr: 0.00048828125
  seed: 442
  early_stopping_gap: 3
  split_num: 5
  split_ratio: 2.0
out_dir: ${calc_path:${model_short}, ${task_name}, ${mdl.probe_hidden_size}, ${mdl.seed},
  ${mdl.init_strategy}, ${mdl.init_gamma}, ${mdl.optimizer}}
